set -g status on
set -g mouse on
set -g mode-keys vi
set -g status-position bottom
set -g status-interval 5

# Make the active window stand out at a glance.
set -g window-status-format ' #I:#W '
set -g window-status-current-format ' #[fg=colour16,bg=colour220,bold] [#I:#W] #[default] '
set -g window-status-current-style 'fg=colour16,bg=colour220,bold'
set -g window-status-style 'fg=colour244,bg=default'

set -g status-left '#[bold]#S #[default]#[fg=colour16,bg=colour220,bold] current: #I:#W #[default] '
set -g status-right '#[fg=colour244]%H:%M'

# Dim inactive panes while leaving the active pane untouched.
setw -g window-style 'fg=colour240,bg=colour235'
setw -g window-active-style 'fg=default,bg=default'

# Show pane titles on pane borders when panes are split.
set -g pane-border-status top
set -g pane-border-format ' #{pane_index}: #{pane_current_command} '
set -g pane-border-lines heavy
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour220'

# Move between panes with Vim-style keys.
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Resize panes with shifted Vim-style keys.
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# Enter resize mode, then use h/j/k/l in any direction without holding Shift.
bind-key r switch-client -T resize-pane \; display-message 'resize mode: h/j/k/l, Esc or Enter to exit'
bind-key -T resize-pane h resize-pane -L 5 \; switch-client -T resize-pane
bind-key -T resize-pane j resize-pane -D 5 \; switch-client -T resize-pane
bind-key -T resize-pane k resize-pane -U 5 \; switch-client -T resize-pane
bind-key -T resize-pane l resize-pane -R 5 \; switch-client -T resize-pane
bind-key -T resize-pane Escape switch-client -T prefix
bind-key -T resize-pane Enter switch-client -T prefix
